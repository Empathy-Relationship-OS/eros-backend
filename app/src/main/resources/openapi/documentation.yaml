      responses:
        '200':
          description: List of passed profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /match/action/{matchId}:
    patch:
      tags:
        - Matching
      summary: Take action on match
      description: Like or pass on a match. Returns mutual match info if it's a match.
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
